<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taraweeh Sajdah Checker</title>

  <style>
    :root{
      --green-900:#062C21;
      --green-700:#0B6E4F;
      --gold-600:#D4AF37;

      --tx:#0b1220;
      --mut:#4b5563;

      --bd:#e5e7eb;
      --bg: linear-gradient(180deg, #F6FFFB 0%, #F4FBF8 40%, #F7FAFF 100%);
      --card:#ffffff;
      --shadow: 0 10px 28px rgba(2, 6, 23, 0.08);
      --ring: 0 0 0 3px rgba(212,175,55,0.22);
    }

    html, body { margin:0; padding:0; background: var(--bg); color: var(--tx); }
    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding: 24px 16px;
    }

    .wrap{ max-width: 980px; margin: 0 auto; }
    h1{ margin:0 0 8px; font-size: 32px; letter-spacing:-0.3px; text-align:center; color: var(--green-900); }
    .muted{ text-align:center; color: var(--mut); font-size:14px; line-height:1.45; }

    .card{
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    label{ display:block; margin:10px 0 6px; font-weight:650; color: var(--green-900); }
    input, select, button{
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      width: 100%;
      box-sizing: border-box;
      background:#fff;
      color: var(--tx);
    }
    input:focus, select:focus{ outline:none; border-color: var(--gold-600); box-shadow: var(--ring); }

    .row{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .inline{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .pill{
      border:1px solid var(--bd);
      border-radius: 999px;
      padding: 8px 10px;
      display:flex;
      gap:8px;
      align-items:center;
      background:#fff;
    }
    .pill.selected{
      border-color: rgba(212,175,55,0.85);
      background: #fff8df;
    }
    .pill input{ width:auto; }

    button{
      width:auto;
      cursor:pointer;
      border: 0;
      background: linear-gradient(180deg, var(--gold-600), #caa130);
      color: var(--green-900);
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(212,175,55,0.20);
      padding: 12px 16px;
    }

    .hr{ height:1px; background: var(--bd); margin: 12px 0; }
    .results{ margin-top: 0; }
    .results .muted2{ color: var(--mut); }
    ul{ margin: 10px 0 0 18px; }

    .err{ color:#7a0b0b; background:#ffe5e5; border:1px solid #ffc0c0; padding:10px 12px; border-radius:12px; font-weight:700; }

    @media (max-width: 820px){
      .row{ grid-template-columns: 1fr; }
      button{ width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Taraweeh Sajdah Checker</h1>
    <div class="muted">
      Choose input type (Page range vs Surah:Ayah range), then select whether to estimate for <strong>8</strong> or <strong>20</strong> rak‘ah.
    </div>

    <div class="card">
      <div class="inline">
        <div class="pill" id="pillSurah">
          <input type="radio" name="mode" id="modeSurah" value="surah" checked />
          <label for="modeSurah" style="margin:0; font-weight:650;">Surah:Ayah range</label>
        </div>
        <div class="pill" id="pillPage">
          <input type="radio" name="mode" id="modePage" value="page" />
          <label for="modePage" style="margin:0; font-weight:650;">Page range</label>
        </div>
      </div>

      <div id="surahInputs" style="margin-top:10px;">
        <label for="surahRange">Surah:Ayah range</label>
        <input id="surahRange" placeholder="Example: 15:1-16:128" />
      </div>

      <div id="pageInputs" style="margin-top:10px; display:none;">
        <label for="pageRange">Page range (604-page mushaf)</label>
        <input id="pageRange" placeholder="Example: 450-455 (or just 450)" />
      </div>

      <div class="row" style="margin-top:6px;">
        <div>
          <label for="sajdahList">Sajdah list</label>
          <select id="sajdahList">
            <option value="15" selected>15 sajdahs (includes 22:77)</option>
            <option value="14">14 sajdahs (exclude 22:77)</option>
          </select>
        </div>
        <div>
          <label for="rakahMode">Estimate rak‘ah for</label>
          <select id="rakahMode">
            <option value="" selected disabled>Select 8 or 20</option>
            <option value="8">8 rak‘ah</option>
            <option value="20">20 rak‘ah</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:6px;">
        <div></div>
        <div>
          <label>&nbsp;</label>
          <button id="checkBtn">Check</button>
        </div>
      </div>

      <div class="hr"></div>
      <div id="out"></div>
    </div>
  </div>

<script>
const VERSE_COUNTS = [
  7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,
  112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,
  54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,
  14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,
  29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,
  11,8,3,9,5,4,7,3,6,3,5,4,5,6
];
function prefSums(arr){ const p=[0]; for(let i=0;i<arr.length;i++) p.push(p[i]+arr[i]); return p; }
const PREF = prefSums(VERSE_COUNTS);

function toGlobalIndex(surah, ayah){
  if(!Number.isInteger(surah) || surah<1 || surah>114) throw new Error("Surah must be 1–114.");
  const maxAyah = VERSE_COUNTS[surah-1];
  if(!Number.isInteger(ayah) || ayah<1 || ayah>maxAyah) throw new Error(`Ayah must be 1–${maxAyah} for surah ${surah}.`);
  return PREF[surah-1] + ayah;
}

function $(id){ return document.getElementById(id); }
function render(html){ $("out").innerHTML = html; }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function parseSurahRange(str){
  const m = str.trim().match(/^(\d{1,3})\s*:\s*(\d{1,3})\s*-\s*(\d{1,3})\s*:\s*(\d{1,3})$/);
  if(!m) throw new Error("Use format like 15:1-16:128");
  const s1=parseInt(m[1],10), a1=parseInt(m[2],10), s2=parseInt(m[3],10), a2=parseInt(m[4],10);
  const start=toGlobalIndex(s1,a1), end=toGlobalIndex(s2,a2);
  return { s1,a1,s2,a2, lo:Math.min(start,end), hi:Math.max(start,end) };
}

function parsePageRange(str){
  const t=str.trim();
  if(!t) throw new Error("Enter a page range, e.g. 450-455 (or just 450).");
  const m=t.match(/^(\d{1,3})(?:\s*-\s*(\d{1,3}))?$/);
  if(!m) throw new Error("Use format like 450-455 (or just 450).");
  let p1=parseInt(m[1],10);
  let p2=m[2]?parseInt(m[2],10):p1;
  if(p1<1||p1>604||p2<1||p2>604) throw new Error("Pages must be between 1 and 604.");
  const lo=Math.min(p1,p2), hi=Math.max(p1,p2);
  return { lo,hi, pagesTonight:(hi-lo)+1 };
}

function clamp(n, lo, hi){ return Math.min(hi, Math.max(lo, n)); }
function rakahBest(frac, totalRakats){
  const f = clamp(frac, 0, 1);
  return clamp(Math.round(f * totalRakats), 1, totalRakats);
}
function fmtPct(frac){ return `${Math.round(frac*100)}%`; }

const SAJDAH_15 = [
  { global:1160, surah:7,  ayah:206, page:176 },
  { global:1722, surah:13, ayah:15,  page:251 },
  { global:1951, surah:16, ayah:50,  page:272 },
  { global:2138, surah:17, ayah:109, page:293 },
  { global:2308, surah:19, ayah:58,  page:309 },
  { global:2613, surah:22, ayah:18,  page:334 },
  { global:2672, surah:22, ayah:77,  page:341 },
  { global:2915, surah:25, ayah:60,  page:365 },
  { global:3185, surah:27, ayah:26,  page:379 },
  { global:3518, surah:32, ayah:15,  page:416 },
  { global:3994, surah:38, ayah:24,  page:454 },
  { global:4256, surah:41, ayah:38,  page:480 },
  { global:4846, surah:53, ayah:62,  page:528 },
  { global:5905, surah:84, ayah:21,  page:589 },
  { global:6125, surah:96, ayah:19,  page:597 }
];

function getSajdahList(mode){
  if(mode==="14") return SAJDAH_15.filter(x => !(x.surah===22 && x.ayah===77));
  return SAJDAH_15;
}

function updatePills(){
  const mode = document.querySelector('input[name="mode"]:checked').value;
  $("pillSurah").classList.toggle("selected", mode === "surah");
  $("pillPage").classList.toggle("selected", mode === "page");
}
function modeChanged(){
  const mode = document.querySelector('input[name="mode"]:checked').value;
  $("surahInputs").style.display = (mode==="surah") ? "block" : "none";
  $("pageInputs").style.display  = (mode==="page")  ? "block" : "none";
  updatePills();
}
document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener("change", modeChanged));
modeChanged();

$("checkBtn").addEventListener("click", () => {
  try{
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const listMode = $("sajdahList").value;

    const rakahMode = $("rakahMode").value;
    if (!rakahMode) throw new Error("Please select 8 or 20 rak‘ah to estimate.");
    const totalRakats = parseInt(rakahMode, 10);

    const sajdahs = getSajdahList(listMode);

    if(mode === "page"){
      const { lo, hi, pagesTonight } = parsePageRange($("pageRange").value);

      const hits = sajdahs
        .filter(s => s.page>=lo && s.page<=hi)
        .sort((a,b)=>a.page-b.page || a.global-b.global);

      if(hits.length===0){
        render(`<div class="results"><strong>No sajdah</strong> in this page range ✅
          <div class="muted2">Pages: <code>${lo}-${hi}</code> • ${pagesTonight} page(s)</div></div>`);
        return;
      }

      let html = `<div class="results"><div><strong>Yes — sajdah occurs in this page range.</strong></div>`;
      html += `<div class="muted2">Estimate shown for <strong>${totalRakats}</strong> rak‘ah.</div><ul>`;

      for(const h of hits){
        const posPages = (h.page - lo) + 0.5;
        const frac = posPages / pagesTonight;
        const rakah = rakahBest(frac, totalRakats);

        html += `<li><strong>${h.surah}:${h.ayah}</strong> <span class="muted2">(page ${h.page})</span>
          — about <strong>${fmtPct(frac)}</strong> into tonight
          — rak‘ah <strong>${rakah}</strong> <span class="muted2">(${totalRakats})</span></li>`;
      }
      html += `</ul></div>`;
      render(html);
      return;
    }

    const { s1,a1,s2,a2, lo, hi } = parseSurahRange($("surahRange").value);
    const totalAyahs = (hi - lo) + 1;

    const hits = sajdahs
      .filter(s => s.global>=lo && s.global<=hi)
      .sort((a,b)=>a.global-b.global);

    if(hits.length===0){
      render(`<div class="results"><strong>No sajdah</strong> in this range ✅
        <div class="muted2">Range: <code>${esc(s1)}:${esc(a1)}-${esc(s2)}:${esc(a2)}</code> • ${totalAyahs} ayahs</div></div>`);
      return;
    }

    let html = `<div class="results"><div><strong>Yes — sajdah occurs in this range.</strong></div>`;
    html += `<div class="muted2">Estimate shown for <strong>${totalRakats}</strong> rak‘ah.</div>`;
    html += `<div class="muted2">Range: <code>${esc(s1)}:${esc(a1)}-${esc(s2)}:${esc(a2)}</code></div><ul>`;

    for(const h of hits){
      const posAyah = (h.global - lo) + 0.5;
      const frac = posAyah / totalAyahs;
      const rakah = rakahBest(frac, totalRakats);

      html += `<li><strong>${h.surah}:${h.ayah}</strong> <span class="muted2">(page ${h.page})</span>
        — about <strong>${fmtPct(frac)}</strong> into tonight
        — rak‘ah <strong>${rakah}</strong> <span class="muted2">(${totalRakats})</span></li>`;
    }

    html += `</ul></div>`;
    render(html);

  } catch(e){
    render(`<div class="err">Error: ${esc(e.message || String(e))}</div>`);
  }
});
</script>
</body>
</html>
